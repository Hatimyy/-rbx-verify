<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RBX.OG - Verify Your Reward</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(255,45,85,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%);
  }
  .container {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px;
    text-align: center;
  }
  .logo {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .logo span { color: #ff2d55; }
  .subtitle {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .success-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ff88, #00d4ff);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 40px;
    animation: scaleIn 0.5s ease;
  }
  @keyframes scaleIn {
    0% { transform: scale(0); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .reward-text {
    font-size: 18px;
    font-weight: 700;
    color: #ffd700;
    margin-bottom: 24px;
  }
  .code-label {
    font-size: 12px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .code-box {
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
  }
  .code-text {
    font-family: 'Courier New', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #ffd700;
    letter-spacing: 4px;
  }
  .copy-btn {
    width: 100%;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #000;
    font-weight: 700;
    font-size: 16px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s;
  }
  .copy-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255,215,0,0.3);
  }
  .copy-btn.copied {
    background: linear-gradient(135deg, #00ff88, #00d4ff);
  }
  .back-btn {
    width: 100%;
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.1);
  }
  .timer {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 16px;
  }
  .timer span { color: #ff2d55; font-weight: 700; }
  .error-msg {
    color: #ff2d55;
    font-size: 14px;
    padding: 20px;
  }
  .loading {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,45,85,0.3);
    border-top-color: #ff2d55;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .warning-box {
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    font-size: 12px;
    color: #ffd700;
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="container" id="mainContainer">
  <div class="loading" id="loading"></div>
  <div id="content" style="display:none;">
    <div class="success-icon">🎉</div>
    <div class="logo"><span>RBX</span>.OG</div>
    <div class="subtitle">Offer Completed Successfully!</div>
    <div class="reward-text" id="rewardText">+0 R$</div>

    <div class="warning-box">
      ⚠️ <strong>Important:</strong> Copy this code now! It will expire in 10 minutes and can only be used once.
    </div>

    <div class="code-label">Your Verification Code</div>
    <div class="code-box">
      <div class="code-text" id="secretCode">----</div>
    </div>

    <button class="copy-btn" id="copyBtn" onclick="copyCode()">
      📋 Copy Code
    </button>

    <a href="#" class="back-btn" id="backBtn" onclick="goBack(event)">
      ← Return to RBX.OG & Enter Code
    </a>

    <div class="timer">
      ⏰ Code expires in <span id="timer">10:00</span>
    </div>
  </div>
  <div class="error-msg" id="errorMsg" style="display:none;"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config (نفس الموجود في index.html)
const firebaseConfig = {
  apiKey: "AIzaSyB7iYbTxQ-I5xDndoxbkjiWlO1eXerk-QE",
  authDomain: "rbxog-firestore.firebaseapp.com",
  projectId: "rbxog-firestore",
  storageBucket: "rbxog-firestore.firebasestorage.app",
  messagingSenderId: "908901695308",
  appId: "1:908901695308:web:11c53dc8184bf4e25599e9"
};

try {
  firebase.initializeApp(firebaseConfig);
} catch(e) {
  console.error('Firebase init error:', e);
}

const db = firebase.firestore();

// قراءة البيانات من localStorage (تم حفظها من الصفحة الرئيسية قبل فتح اللوكر)
const sessionData = JSON.parse(localStorage.getItem('rbxog_verify_session') || '{}');
const sessionId = sessionData.sessionId || '';
const reward = sessionData.reward || 0;
const userId = sessionData.userId || '';
const backUrl = sessionData.backUrl || 'https://yourblog.blogspot.com'; // ← غيّر هذا لرابط مدونتك

const loadingEl = document.getElementById('loading');
const contentEl = document.getElementById('content');
const errorEl = document.getElementById('errorMsg');

// التحقق من البيانات
if (!sessionId || !userId || !reward) {
  loadingEl.style.display = 'none';
  errorEl.style.display = 'block';
  errorEl.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:48px;margin-bottom:12px;">😕</div>
      <div style="font-weight:bold;margin-bottom:8px;">Session Not Found</div>
      <div style="color:#9ca3af;margin-bottom:16px;">
        Please complete an offer from the RBX.OG app first.
      </div>
      <a href="${backUrl}" style="display:inline-block;background:linear-gradient(135deg,#ff2d55,#ff6b6b);color:#fff;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:700;">
        Go to RBX.OG
      </a>
    </div>
  `;
} else {
  // توليد كود عشوائي
  function generateCode() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = 'RBX-';
    for (let i = 0; i < 8; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
      if (i === 3) code += '-';
    }
    return code;
  }

  const secretCode = generateCode();
  const expiresAt = Date.now() + (10 * 60 * 1000); // 10 دقائق

  // حفظ الكود في Firestore
  db.collection('verificationCodes').doc(sessionId).set({
    code: secretCode,
    reward: reward,
    userId: userId,
    sessionId: sessionId,
    used: false,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    expiresAt: new Date(expiresAt)
  }).then(() => {
    loadingEl.style.display = 'none';
    contentEl.style.display = 'block';

    document.getElementById('rewardText').textContent = '+' + reward + ' R$';
    document.getElementById('secretCode').textContent = secretCode;
    document.getElementById('backBtn').href = backUrl;

    // حفظ الكود في localStorage للاسترجاع
    localStorage.setItem('rbxog_last_code', secretCode);

    // عد تنازلي
    let timeLeft = 600; // 10 دقائق بالثواني
    const timerEl = document.getElementById('timer');
    const timerInterval = setInterval(() => {
      timeLeft--;
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      timerEl.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerEl.textContent = 'EXPIRED';
        timerEl.style.color = '#ff2d55';
      }
    }, 1000);

  }).catch(err => {
    console.error('Save error:', err);
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
        <div style="font-weight:bold;margin-bottom:8px;">Error Generating Code</div>
        <div style="color:#9ca3af;margin-bottom:16px;">
          Please try again or contact support.
        </div>
        <a href="${backUrl}" style="display:inline-block;background:linear-gradient(135deg,#ff2d55,#ff6b6b);color:#fff;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:700;">
          Go Back
        </a>
      </div>
    `;
  });
}

// نسخ الكود
function copyCode() {
  const code = document.getElementById('secretCode').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 Copy Code';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const input = document.createElement('input');
    input.value = code;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => btn.innerHTML = '📋 Copy Code', 2000);
  });
}

// العودة للموقع الرئيسي
function goBack(e) {
  e.preventDefault();
  // نحاول فتح التطبيق إذا كان على موبايل
  window.location.href = backUrl + '#verify';
}
</script>
</body>
</html>
